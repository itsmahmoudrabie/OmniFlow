# Railway / Nixpacks build configuration for OmniFlow

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
    "npm --prefix server install --omit=dev",
    "npm --prefix dashboard-react install"
]

[phases.build]
cmds = ["npm --prefix dashboard-react run build"]

[start]
cmd = "node server/index.js"

[variables]
NODE_ENV = "production"
NPM_CONFIG_PRODUCTION = "false"
