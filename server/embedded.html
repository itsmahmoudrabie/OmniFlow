<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniFlow</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #001A11; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    .card { background: #002A1A; border: 1px solid #0a3d20; border-radius: 12px; padding: 28px 24px; max-width: 440px; margin: 40px auto; }
    .logo { font-size: 20px; font-weight: 700; color: #8CC850; margin-bottom: 22px; letter-spacing: -0.3px; }
    .logo span { opacity: 0.7; font-size: 14px; font-weight: 400; margin-left: 8px; color: #4a7a55; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid #0a3d20; font-size: 14px; gap: 12px; }
    .row:last-of-type { border: none; }
    .label { color: #4a8a5a; flex-shrink: 0; }
    .value { color: #e0ffe8; font-weight: 500; text-align: right; word-break: break-all; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-active   { background: #8CC850; color: #001A11; }
    .badge-trial    { background: #f0a500; color: #001A11; }
    .badge-cancelled { background: #c0392b; color: #fff; }
    .badge-default  { background: #2a5a3a; color: #8CC850; }
    .trial-days { color: #f0a500; font-weight: 600; }
    .btn {
      display: block; width: 100%; margin-top: 24px; padding: 13px 20px;
      background: #8CC850; color: #001A11; font-size: 15px; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer; text-align: center;
      text-decoration: none; transition: background 0.15s;
    }
    .btn:hover { background: #a0db60; }
    .loading { text-align: center; padding: 70px 20px; color: #4a8a5a; font-size: 15px; }
    .loading::after { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #8CC850; margin-left: 8px; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:0.3 } 50% { opacity:1 } }
    .error { color: #f87171; text-align: center; padding: 24px 20px; font-size: 14px; line-height: 1.6; }
    .error a { color: #8CC850; }
    @media (max-width: 480px) { .card { margin: 16px; padding: 20px 16px; } }
  </style>
</head>
<body>
  <div id="root"><div class="loading">Loading account</div></div>
  <script>
    // JWT and shop passed via URL hash: /embedded#jwt=TOKEN&shop=STORE.myshopify.com
    var params = new URLSearchParams(location.hash.slice(1));
    var jwt    = params.get('jwt');
    var shop   = params.get('shop') || '';

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = '<div class="error">' + msg + '</div>';
    }

    function planBadge(plan, status) {
      var cls = status === 'trial' ? 'badge-trial'
              : status === 'active' ? 'badge-active'
              : status === 'cancelled' ? 'badge-cancelled'
              : 'badge-default';
      var label = plan ? plan.charAt(0).toUpperCase() + plan.slice(1) : '—';
      return '<span class="badge ' + cls + '">' + label + '</span>';
    }

    function render(t) {
      var trialDays = t.trialEnds
        ? Math.max(0, Math.ceil((new Date(t.trialEnds) - Date.now()) / 86400000))
        : 0;
      var storeDomain = (t.config && t.config.shopify_url ? t.config.shopify_url : shop)
        .replace(/https?:\/\//i, '').replace(/\/$/, '') || '—';

      var trialRow = trialDays > 0
        ? '<div class="row"><span class="label">Trial ends in</span><span class="value trial-days">' + trialDays + ' days</span></div>'
        : '';

      var dashUrl = location.origin + '/#shopify_token=' + encodeURIComponent(jwt) + '&shop=' + encodeURIComponent(shop);

      document.getElementById('root').innerHTML =
        '<div class="card">' +
          '<div class="logo">⚡ OmniFlow <span>Shopify App</span></div>' +
          '<div class="row"><span class="label">Name</span><span class="value">'   + esc(t.name)  + '</span></div>' +
          '<div class="row"><span class="label">Email</span><span class="value">'  + esc(t.email) + '</span></div>' +
          '<div class="row"><span class="label">Plan</span><span class="value">'   + planBadge(t.plan, t.status) + '</span></div>' +
          trialRow +
          '<div class="row"><span class="label">Status</span><span class="value">' + esc(t.status) + '</span></div>' +
          '<div class="row"><span class="label">Store</span><span class="value">'  + esc(storeDomain) + '</span></div>' +
          '<a class="btn" href="' + dashUrl + '" target="_blank">Open Full Dashboard ↗</a>' +
        '</div>';
    }

    function init() {
      if (!jwt) {
        showError('Missing credentials. Please <a href="/auth?shop=' + encodeURIComponent(shop) + '">reinstall the app</a>.');
        return;
      }
      fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + jwt } })
        .then(function(res) {
          if (!res.ok) throw new Error('auth_failed');
          return res.json();
        })
        .then(render)
        .catch(function() {
          showError(
            'Could not load account info. ' +
            '<a href="/auth?shop=' + encodeURIComponent(shop) + '">Reconnect store</a>'
          );
        });
    }

    init();
  </script>
</body>
</html>
