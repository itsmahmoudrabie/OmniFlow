name: Deploy to Railway

# Triggers a Railway deployment on every push to `main`.
# Railway also auto-deploys when connected to GitHub — this workflow is optional
# and provides a manual safety net + status reporting in GitHub.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID || 'omniflow' }} --detach
